name: American International Group (AIG)
description: >-
  American International Group (AIG) is one of the world's most extensive international
  insurance organizations, operating in more than 200 countries and jurisdictions.
  AIG provides a broad range of property casualty insurance, life insurance, retirement
  solutions, and other financial services to commercial and individual customers worldwide.
  The company's offerings include casualty, property, cyber, professional liability,
  management liability, marine, aviation, energy, trade credit, and private client insurance.
