common:
  - type: Website
    url: https://www.aig.com
  - type: Features
    data:
      - name: Commercial Property and Casualty Insurance
        description: >-
          Comprehensive commercial insurance including excess casualty, foreign casualty,
          primary coverage, commercial property, and builders risk for global businesses.
      - name: Cyber Insurance
        description: >-
          Cyber liability coverage protecting businesses from data breaches, ransomware,
          business interruption, and regulatory penalties across global operations.
      - name: Management and Professional Liability
        description: >-
          Directors and officers liability, employment practices liability, errors and
          omissions, and fiduciary liability for corporate clients worldwide.
      - name: Marine and Aviation Insurance
        description: >-
          Ocean cargo, inland marine, marine liability, aviation hull, and aviation
          liability coverage for transportation and logistics industries.
      - name: Trade Credit and Political Risk
        description: >-
          Insurance protecting businesses from commercial payment defaults and political
          risks in domestic and cross-border trade transactions.
      - name: IntelliRisk Advanced Platform
        description: >-
          Digital client portal enabling claims filing, risk data access, loss reporting,
          and risk management analytics across 100+ countries.
      - name: Private Client Insurance
        description: >-
          High-net-worth individual insurance including homes, autos, art, jewelry, and
          personal liability through AIG's Private Client Group.
      - name: Global Network Insurance
        description: >-
          Multinational insurance programs and network solutions coordinating coverage
          for corporations operating across multiple international jurisdictions.
  - type: UseCases
    data:
      - name: Multinational Corporate Risk Management
        description: >-
          Coordinating insurance programs for corporations with operations in multiple
          countries, ensuring consistent coverage under local regulatory requirements.
      - name: Cyber Risk Transfer
        description: >-
          Transferring enterprise cyber risk through comprehensive cyber liability policies
          covering first-party losses and third-party liability.
      - name: Executive and Corporate Governance Protection
        description: >-
          Protecting executives and corporate boards from personal liability through
          directors and officers, fiduciary, and employment practices liability coverage.
      - name: International Trade Finance
        description: >-
          Protecting banks, exporters, and buyers from payment default and political
          risks in international trade transactions.
      - name: High-Net-Worth Personal Lines
        description: >-
          Providing specialized coverage for high-value homes, vehicles, art collections,
          jewelry, and personal liability for affluent individuals.
  - type: Integrations
    data:
      - name: Broker and Agent Management Systems
        description: >-
          Integration with insurance broker platforms and agent management systems for
          policy quoting, binding, and servicing across AIG's commercial lines.
      - name: IntelliRisk Client Portal
        description: >-
          Digital portal integrating with client risk management systems for claims
          reporting, loss data analysis, and risk control services globally.
      - name: Reinsurance Platforms
        description: >-
          Integration with reinsurance markets and treaty reinsurers to manage AIG's
          risk retention and cession across global insurance programs.
